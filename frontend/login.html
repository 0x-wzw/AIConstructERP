<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConstructERP // Sign In</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0c0f1a; color: #94a3b8; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .glass { background: rgba(18,22,36,0.85); backdrop-filter: blur(16px); border: 1px solid rgba(45,55,80,0.5); }
        input { transition: all .2s; }
        input:focus { border-color: rgba(245,158,11,0.5); box-shadow: 0 0 0 3px rgba(245,158,11,0.1); outline: none; }
        .demo-btn { transition: all .15s; }
        .demo-btn:hover { border-color: rgba(245,158,11,0.4); background: rgba(245,158,11,0.06); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-sm">
        <div class="flex items-center justify-center gap-3 mb-6">
            <div class="w-9 h-9 rounded-lg bg-gradient-to-br from-amber-500 to-yellow-600 flex items-center justify-center text-white font-bold text-sm">CE</div>
            <div>
                <h1 class="text-white font-bold text-lg tracking-tight">Construct<span class="text-amber-400">ERP</span></h1>
                <div class="text-[9px] mono text-slate-600">Project Management Suite</div>
            </div>
        </div>

        <div class="glass rounded-2xl p-6">
            <h2 class="text-white font-semibold text-sm mb-1">Sign in</h2>
            <p class="text-xs text-slate-500 mb-5">Authenticate against the ConstructERP API.</p>

            <form id="login-form" class="space-y-3">
                <div>
                    <label class="text-xs text-slate-400 mb-1 block">Email</label>
                    <input id="email" type="email" autocomplete="username" required
                           class="w-full bg-slate-900/60 border border-slate-700 rounded-xl px-4 py-2.5 text-sm text-white placeholder-slate-600"
                           placeholder="you@constructerp.dev">
                </div>
                <div>
                    <label class="text-xs text-slate-400 mb-1 block">Password</label>
                    <input id="password" type="password" autocomplete="current-password" required
                           class="w-full bg-slate-900/60 border border-slate-700 rounded-xl px-4 py-2.5 text-sm text-white placeholder-slate-600"
                           placeholder="••••••••">
                </div>
                <div id="error" class="hidden text-xs text-rose-400 bg-rose-500/10 border border-rose-500/20 rounded-lg px-3 py-2"></div>
                <button type="submit" id="submit"
                        class="w-full py-2.5 bg-amber-500 hover:bg-amber-400 text-slate-900 rounded-xl text-sm font-semibold transition-all flex items-center justify-center gap-2">
                    <span id="submit-label">Sign In</span>
                </button>
            </form>

            <div class="mt-5 pt-4 border-t border-slate-800">
                <div class="text-[10px] uppercase tracking-widest text-slate-600 font-semibold mb-2">Demo accounts</div>
                <div class="grid grid-cols-3 gap-2" id="demo-accounts"></div>
            </div>

            <div class="mt-4 flex items-center gap-2">
                <label class="text-[10px] text-slate-600">API</label>
                <input id="api-base" type="text" class="flex-1 bg-slate-900/60 border border-slate-800 rounded-lg px-2 py-1 text-[10px] mono text-slate-400">
            </div>
        </div>
        <p class="text-center text-[10px] text-slate-700 mt-4">Serve this folder over http:// and start the backend on :8787</p>
    </div>

    <script src="api.js"></script>
    <script>
        const DEMO = [
            { label: 'Superadmin', email: 'superadmin@constructerp.dev', pw: 'super123', cls: 'text-amber-400' },
            { label: 'Vendor',     email: 'vendor@constructerp.dev',     pw: 'vendor123', cls: 'text-blue-400' },
            { label: 'Supplier',   email: 'supplier@constructerp.dev',   pw: 'supplier123', cls: 'text-green-400' },
        ];

        // If already signed in, go straight to the app.
        if (ConstructERP.isAuthed()) location.replace('app.html');

        document.getElementById('api-base').value = ConstructERP.baseUrl();
        document.getElementById('api-base').addEventListener('change', e => ConstructERP.setBaseUrl(e.target.value));

        const demoWrap = document.getElementById('demo-accounts');
        DEMO.forEach(d => {
            const b = document.createElement('button');
            b.className = 'demo-btn border border-slate-700 rounded-lg py-2 text-[11px] font-medium ' + d.cls;
            b.textContent = d.label;
            b.onclick = () => { document.getElementById('email').value = d.email; document.getElementById('password').value = d.pw; };
            demoWrap.appendChild(b);
        });

        const errBox = document.getElementById('error');
        function showError(msg) { errBox.textContent = msg; errBox.classList.remove('hidden'); }

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            errBox.classList.add('hidden');
            const btn = document.getElementById('submit');
            const lbl = document.getElementById('submit-label');
            btn.disabled = true; lbl.textContent = 'Signing in…';
            try {
                await ConstructERP.login(document.getElementById('email').value.trim(), document.getElementById('password').value);
                location.replace('app.html');
            } catch (err) {
                showError(err.message || 'Login failed');
                btn.disabled = false; lbl.textContent = 'Sign In';
            }
        });

        lucide.createIcons();
    </script>
</body>
</html>
