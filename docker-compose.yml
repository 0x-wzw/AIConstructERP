services:
  api:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      # Named volume (not a bind mount) so it stays writable by the container's
      # non-root user. Only relevant for STORAGE_BACKEND=local.
      - uploads:/app/uploads
    environment:
      - DATABASE_URL=postgresql+psycopg://constructerp:${POSTGRES_PASSWORD:-constructerp}@db:5432/constructerp
      # SECRET_KEY MUST be set for any real deploy (and is required if WORKERS>1,
      # else JWTs signed by one worker are rejected by another).
      - SECRET_KEY=${SECRET_KEY:-dev-insecure-change-me}
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
      - WORKERS=${WORKERS:-1}
      # ── File storage ──────────────────────────────────────────────
      # Default: local disk (the uploads volume above).
      - STORAGE_BACKEND=${STORAGE_BACKEND:-local}
      - UPLOAD_DIR=/app/uploads
      # To store files in the bundled MinIO instead, set in your .env:
      #   STORAGE_BACKEND=s3
      #   S3_BUCKET=constructerp  S3_KEY=minioadmin  S3_SECRET=minioadmin
      #   S3_ENDPOINT=http://minio:9000  S3_FORCE_PATH_STYLE=true
      - S3_BUCKET=${S3_BUCKET:-}
      - S3_KEY=${S3_KEY:-}
      - S3_SECRET=${S3_SECRET:-}
      - S3_REGION=${S3_REGION:-us-east-1}
      - S3_ENDPOINT=${S3_ENDPOINT:-}
      - S3_FORCE_PATH_STYLE=${S3_FORCE_PATH_STYLE:-false}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')\""]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: constructerp
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-constructerp}
      POSTGRES_DB: constructerp
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U constructerp"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Optional: MinIO for S3-compatible file storage
  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped

  # Optional: Ollama for local AI (uncomment to enable)
  # ollama:
  #   image: ollama/ollama:latest
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - ollama_data:/root/.ollama
  #   restart: unless-stopped

volumes:
  pgdata:
  minio_data:
  uploads:
  # ollama_data: