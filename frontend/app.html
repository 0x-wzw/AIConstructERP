<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConstructERP // Connected</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0c0f1a; color: #94a3b8; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .glass { background: rgba(18,22,36,0.85); backdrop-filter: blur(16px); border: 1px solid rgba(45,55,80,0.5); }
        .toast { animation: slidein .25s ease-out; }
        @keyframes slidein { from { opacity:0; transform:translateX(20px);} to {opacity:1;transform:translateX(0);} }
        input:focus, select:focus { border-color: rgba(245,158,11,0.5); box-shadow: 0 0 0 3px rgba(245,158,11,0.1); outline: none; }
    </style>
</head>
<body class="min-h-screen">
    <!-- Top bar -->
    <header class="glass border-b border-slate-800 h-14 flex items-center justify-between px-6 sticky top-0 z-20">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-amber-500 to-yellow-600 flex items-center justify-center text-white font-bold text-sm">CE</div>
            <div>
                <div class="text-white font-bold text-sm">Construct<span class="text-amber-400">ERP</span> <span class="text-[9px] mono text-green-400 border border-green-500/30 rounded px-1.5 py-0.5 ml-1">API-CONNECTED</span></div>
                <div class="text-[9px] mono text-slate-600" id="api-label">—</div>
            </div>
        </div>
        <div class="flex items-center gap-3">
            <div class="text-right">
                <div class="text-xs text-white font-medium" id="user-email">—</div>
                <div class="text-[10px]"><span id="role-badge" class="mono px-1.5 py-0.5 rounded bg-amber-500/15 text-amber-400">—</span></div>
            </div>
            <button onclick="doLogout()" class="p-1.5 hover:bg-slate-800 rounded-lg text-slate-400 hover:text-rose-400" title="Sign out">
                <i data-lucide="log-out" class="w-4 h-4"></i>
            </button>
        </div>
    </header>

    <main class="max-w-6xl mx-auto p-6 space-y-6">
        <!-- KPIs -->
        <div class="grid grid-cols-4 gap-4" id="kpis"></div>

        <!-- Projects -->
        <section class="glass rounded-2xl border border-slate-800 overflow-hidden">
            <div class="p-4 border-b border-slate-800 flex items-center justify-between">
                <h2 class="text-white font-semibold text-sm flex items-center gap-2"><i data-lucide="building-2" class="w-4 h-4 text-blue-400"></i> Projects</h2>
                <button id="add-project" onclick="addProject()" class="px-3 py-1.5 bg-amber-500 hover:bg-amber-400 text-slate-900 rounded-lg text-xs font-medium flex items-center gap-1.5"><i data-lucide="plus" class="w-3.5 h-3.5"></i> New</button>
            </div>
            <div class="overflow-x-auto"><table class="w-full text-sm"><thead class="bg-slate-950/50 text-[10px] uppercase tracking-widest text-slate-600">
                <tr><th class="text-left p-3 font-semibold">Name</th><th class="text-left p-3 font-semibold">Location</th><th class="text-right p-3 font-semibold">Budget</th><th class="text-right p-3 font-semibold">Progress</th><th class="text-left p-3 font-semibold">Status</th><th class="w-8"></th></tr>
            </thead><tbody id="projects-body" class="divide-y divide-slate-800/40"></tbody></table></div>
        </section>

        <!-- Purchase Orders -->
        <section class="glass rounded-2xl border border-slate-800 overflow-hidden">
            <div class="p-4 border-b border-slate-800 flex items-center justify-between">
                <h2 class="text-white font-semibold text-sm flex items-center gap-2"><i data-lucide="truck" class="w-4 h-4 text-orange-400"></i> Purchase Orders</h2>
                <button id="add-po" onclick="addPO()" class="px-3 py-1.5 bg-orange-500 hover:bg-orange-400 text-white rounded-lg text-xs font-medium flex items-center gap-1.5"><i data-lucide="plus" class="w-3.5 h-3.5"></i> New PO</button>
            </div>
            <div class="overflow-x-auto"><table class="w-full text-sm"><thead class="bg-slate-950/50 text-[10px] uppercase tracking-widest text-slate-600">
                <tr><th class="text-left p-3 font-semibold">PO #</th><th class="text-left p-3 font-semibold">Supplier</th><th class="text-left p-3 font-semibold">Item</th><th class="text-right p-3 font-semibold">Amount</th><th class="text-left p-3 font-semibold">Status</th><th class="w-8"></th></tr>
            </thead><tbody id="pos-body" class="divide-y divide-slate-800/40"></tbody></table></div>
        </section>

        <p class="text-center text-[10px] text-slate-700">Data is served live from the FastAPI backend. Buttons you're not permitted to use are hidden by role, and the server enforces it regardless.</p>
    </main>

    <div id="toasts" class="fixed bottom-5 right-5 z-50 space-y-2 flex flex-col items-end"></div>

    <script src="api.js"></script>
    <script>
        const $ = id => document.getElementById(id);
        const money = n => '$' + Math.round(Number(n)).toLocaleString('en-US');
        const esc = s => String(s ?? '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

        // ── Auth gate ──
        if (!ConstructERP.isAuthed()) location.replace('login.html');

        function doLogout() { ConstructERP.logout(); location.replace('login.html'); }

        function toast(msg, type = 'info') {
            const c = { success: 'text-green-300 border-green-500/30', error: 'text-rose-300 border-rose-500/30', info: 'text-slate-300 border-slate-600' }[type];
            const el = document.createElement('div');
            el.className = `toast glass border ${c} rounded-xl px-4 py-2.5 text-xs shadow-lg`;
            el.textContent = msg;
            $('toasts').appendChild(el);
            setTimeout(() => { el.style.transition = 'opacity .3s'; el.style.opacity = '0'; setTimeout(() => el.remove(), 300); }, 2600);
        }

        async function handle(promise, okMsg) {
            try { const r = await promise; if (okMsg) toast(okMsg, 'success'); return r; }
            catch (e) {
                toast(e.message, 'error');
                if (e.status === 401) setTimeout(() => location.replace('login.html'), 800);
                throw e;
            }
        }

        // ── Render ──
        const STATUS_COLOR = { active:'text-green-400', planning:'text-amber-400', on_hold:'text-rose-400', complete:'text-blue-400' };
        const PO_BADGE = { Delivered:'bg-green-500/10 text-green-400 border-green-500/20', 'In Transit':'bg-amber-500/10 text-amber-400 border-amber-500/20', Ordered:'bg-blue-500/10 text-blue-400 border-blue-500/20', Pending:'bg-purple-500/10 text-purple-400 border-purple-500/20' };

        function renderKPIs(state) {
            const totalBudget = state.budget.reduce((s, b) => s + Number(b.budget), 0);
            const spent = state.budget.reduce((s, b) => s + Number(b.spent), 0);
            const workforce = (state.resources.labor || []).reduce((s, r) => s + r.available, 0);
            const avg = state.projects.length ? Math.round(state.projects.reduce((s, p) => s + p.progress, 0) / state.projects.length) : 0;
            const cards = [
                ['Projects', state.projects.length, 'building-2', 'text-blue-400'],
                ['Total Budget', money(totalBudget), 'wallet', 'text-yellow-400'],
                ['Workforce', workforce, 'hard-hat', 'text-green-400'],
                ['Avg Progress', avg + '%', 'trending-up', 'text-purple-400'],
            ];
            $('kpis').innerHTML = cards.map(([label, val, icon, col]) => `
                <div class="glass rounded-2xl p-4 border border-slate-800">
                    <div class="flex items-center justify-between mb-2"><span class="text-[10px] uppercase tracking-widest text-slate-600 font-semibold">${label}</span><i data-lucide="${icon}" class="w-4 h-4 ${col}"></i></div>
                    <div class="text-xl font-bold text-white mono">${val}</div>
                </div>`).join('');
        }

        function delCell(section, id) {
            return ConstructERP.canWrite(section)
                ? `<button onclick="del('${section}', ${id})" class="text-slate-600 hover:text-rose-400"><i data-lucide="trash-2" class="w-3.5 h-3.5"></i></button>` : '';
        }

        function renderProjects(list) {
            $('projects-body').innerHTML = list.map(p => `
                <tr class="hover:bg-slate-800/20">
                    <td class="p-3 text-white">${esc(p.name)}</td>
                    <td class="p-3 text-slate-400">${esc(p.location) || '—'}</td>
                    <td class="p-3 text-right text-white mono">${money(p.budget)}</td>
                    <td class="p-3 text-right text-amber-400 mono">${p.progress}%</td>
                    <td class="p-3"><span class="${STATUS_COLOR[p.status] || 'text-slate-400'} text-xs">${esc(p.status)}</span></td>
                    <td class="p-3 text-right">${delCell('projects', p.id)}</td>
                </tr>`).join('') || `<tr><td colspan="6" class="p-6 text-center text-slate-600 italic text-xs">No projects.</td></tr>`;
        }

        function renderPOs(list) {
            $('pos-body').innerHTML = list.map(po => `
                <tr class="hover:bg-slate-800/20">
                    <td class="p-3 text-cyan-400 mono text-xs">${esc(po.po_number)}</td>
                    <td class="p-3 text-slate-300">${esc(po.supplier)}</td>
                    <td class="p-3 text-slate-400">${esc(po.item)}</td>
                    <td class="p-3 text-right text-white mono">${money(po.amount)}</td>
                    <td class="p-3"><span class="text-[10px] px-2 py-0.5 rounded border ${PO_BADGE[po.status] || 'bg-slate-500/10 text-slate-400 border-slate-500/20'}">${esc(po.status)}</span></td>
                    <td class="p-3 text-right">${delCell('pos', po.id)}</td>
                </tr>`).join('') || `<tr><td colspan="6" class="p-6 text-center text-slate-600 italic text-xs">No purchase orders.</td></tr>`;
        }

        function applyRoleUI() {
            $('add-project').style.display = ConstructERP.canWrite('projects') ? '' : 'none';
            $('add-po').style.display = ConstructERP.canWrite('pos') ? '' : 'none';
        }

        // ── Actions ──
        async function addProject() {
            const name = prompt('Project name?'); if (!name) return;
            const budget = Number(prompt('Budget ($)?', '500000')) || 0;
            await handle(ConstructERP.projects.create({ name, budget, status: 'planning' }), 'Project created');
            refresh();
        }
        async function addPO() {
            const supplier = prompt('Supplier?'); if (!supplier) return;
            const item = prompt('Item?') || 'Misc'; const amount = Number(prompt('Amount ($)?', '10000')) || 0;
            const po = await handle(ConstructERP.pos.create({ supplier, item, amount }), 'PO created');
            if (po) toast('Assigned ' + po.po_number, 'info');
            refresh();
        }
        async function del(section, id) {
            if (!confirm('Delete this record?')) return;
            await handle(ConstructERP[section].remove(id), 'Deleted');
            refresh();
        }

        // ── Load ──
        async function refresh() {
            const state = await handle(ConstructERP.state());
            if (!state) return;
            renderKPIs(state);
            renderProjects(state.projects);
            renderPOs(state.pos);
            lucide.createIcons();
        }

        (async function init() {
            $('api-label').textContent = ConstructERP.baseUrl().replace(/^https?:\/\//, '');
            $('role-badge').textContent = ConstructERP.roleLabel() + ' · ' + (ConstructERP.role() || '');
            try {
                const me = await ConstructERP.me();
                $('user-email').textContent = me.email;
            } catch (e) { /* handled on refresh */ }
            applyRoleUI();
            await refresh();
        })();
    </script>
</body>
</html>
